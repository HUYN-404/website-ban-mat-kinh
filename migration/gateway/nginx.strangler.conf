worker_processes 1;

events {
  worker_connections 1024;
}

http {
  upstream node_legacy {
    server host.docker.internal:3000;
  }

  upstream drf_v2 {
    server host.docker.internal:8000;
  }

  server {
    listen 8080;
    server_name _;

    # Legacy health for compatibility monitors
    location = /health {
      proxy_pass http://node_legacy/health;
    }

    # New API path
    location /api/v2/ {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-Id $request_id;
      proxy_pass http://drf_v2/api/v2/;
    }

    # DRF docs and schema
    location /api/docs/ {
      proxy_pass http://drf_v2/api/docs/;
    }

    location /api/schema/ {
      proxy_pass http://drf_v2/api/schema/;
    }

    # Legacy static uploads (until fully migrated)
    location /uploads/ {
      proxy_pass http://node_legacy/uploads/;
    }

    # Keep current clients working on /api/*
    location /api/ {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-Id $request_id;
      proxy_pass http://node_legacy/api/;
    }
  }
}
